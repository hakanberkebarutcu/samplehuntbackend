<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#A855F7" />
    <meta name="description" content="SampleHunt — Discover music samples from around the world" />

    <!-- iOS PWA (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SampleHunt" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="%PUBLIC_URL%/logo512.png" />

    <!-- Android -->
    <meta name="application-name" content="SampleHunt" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>SampleHunt</title>
    <style>
      html, body { margin: 0; padding: 0; overscroll-behavior-y: none; background: #0D1B2A; }
      body { -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
      /* Safe-area (iPhone notch) desteği */
      @supports (padding: env(safe-area-inset-top)) {
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
      }
    </style>
  </head>
